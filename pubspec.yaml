name: gpxr
description: "A lightweight GPX route editor for the web."
publish_to: 'none'
version: 1.3.0+4

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  xml: ^6.5.0
  file_picker: ^8.0.0+1
  provider: ^6.1.2
  uuid: ^4.4.0
  collection: ^1.19.0
  intl: ^0.20.2
  flutter_map_cancellable_tile_provider: ^3.0.2
  http: ^1.2.2
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
